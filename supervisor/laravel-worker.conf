; https://github.com/invoiceninja/invoiceninja/blob/v5-stable/app/Console/Kernel.php#L123
; it starts up queue:work database depending on INTERNAL_QUEUE_ENABLED . Set to false in our case (set to true by default)
[program:queue]
command=php /app/code/artisan queue:work database --memory=256
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
