name: Build & Publish Cloudron Image

# Builds the Cloudron app image and publishes it to GHCR.
#
# The image bundles the Invoice Ninja release from salemaziel/invoiceninja. That repo
# is private, so the build needs a PAT with contents:read stored as the repo secret
# INVOICENINJA_FORK_TOKEN, passed to the build as the BuildKit secret `gh_token`.
#
# Publishing to GHCR uses the automatic GITHUB_TOKEN (packages: write) — same
# account, no extra secret needed.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      fork_release:
        description: 'invoiceninja fork release tag to bundle (blank = Dockerfile default)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/salemaziel/invoiceninja-app-cloudron

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tags from manifest
        id: meta
        run: |
          VERSION="$(jq -r '.version' CloudronManifest.json)"
          UPSTREAM="$(jq -r '.upstreamVersion' CloudronManifest.json)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "upstream=${UPSTREAM}" >> "$GITHUB_OUTPUT"
          echo "Building ${IMAGE}:${VERSION} (upstream ${UPSTREAM})"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          # Single-manifest image (no attestation manifests) so `cloudron install` pulls cleanly.
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
          # Token is a BuildKit secret (tmpfs-mounted for one RUN), never a build-arg.
          secrets: |
            gh_token=${{ secrets.INVOICENINJA_FORK_TOKEN }}
          build-args: |
            ${{ github.event.inputs.fork_release && format('INVOICENINJA_RELEASE={0}', github.event.inputs.fork_release) || '' }}

      - name: Summary
        run: |
          {
            echo "### Published"
            echo ""
            echo "- \`${IMAGE}:${{ steps.meta.outputs.version }}\`"
            echo "- \`${IMAGE}:latest\`"
            echo ""
            echo "Install on Cloudron:"
            echo '```'
            echo "cloudron install --image ${IMAGE}:${{ steps.meta.outputs.version }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
