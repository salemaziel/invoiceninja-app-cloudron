; https://laravel.com/docs/10.x/scheduling#running-the-scheduler
; https://laravel.com/docs/10.x/scheduling#running-the-scheduler-locally
; artisan schedule:run will run it one time. typically this is put into cron
; artisan schedule:work will run in foreground and do a run every 1 minunte
[program:scheduler]
command=php /app/code/artisan schedule:work
directory=/app/code
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=3600
